{% assign crumb_url = page.url | absolute_url %}
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <a href="{{ '/' | relative_url }}">Home</a>
  <span aria-hidden="true">/</span>
  <span>{{ page.breadcrumb_title | default: page.title }}</span>
</nav>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ site.url | append: '/' | jsonify }}
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.breadcrumb_title | default: page.title | jsonify }},
      "item": {{ crumb_url | jsonify }}
    }
  ]
}
</script>
