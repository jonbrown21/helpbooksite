<aside
  id="cookie-consent-banner"
  class="cookie-consent"
  role="dialog"
  aria-live="polite"
  aria-label="Cookie preferences"
  hidden>
  <div class="cookie-consent__inner">
    <p class="cookie-consent__title">Cookie preferences</p>
    <p class="cookie-consent__copy">
      We use essential cookies to keep this site running and optional cookies to understand site usage.
      You can accept all cookies or reject non-essential cookies.
      <a href="{{ '/privacy/' | relative_url }}">Learn more</a>.
    </p>
    <div class="cookie-consent__actions">
      <button type="button" class="abm-btn abm-btn--ghost cookie-consent__btn" data-cookie-action="reject">Reject non-essential</button>
      <button type="button" class="abm-btn cookie-consent__btn" data-cookie-action="accept">Accept all</button>
    </div>
  </div>
</aside>
